name = "inspect-able"
main = "src/server/index.ts"
compatibility_date = "2025-02-14"
compatibility_flags = ["nodejs_compat"]
account_id = "0a95bd1dec2ca90909a8a41fe077dce5"

[[routes]]
pattern = "kiosk.inspect-able.com"
custom_domain = true

[[routes]]
pattern = "www.inspect-able.com"
custom_domain = true

[[routes]]
pattern = "inspect-able.com"
custom_domain = true

[triggers]
crons = ["0 2 * * *"]  # Daily backup at 02:00 UTC

[vars]
ALLOWED_DOMAIN = "poliku.edu.my"
# Secrets (set via `wrangler secret put`):
#   JWT_SECRET — Internal HS256 signing key

[assets]
directory = "./dist/client"
binding = "ASSETS"

[ai]
binding = "AI"

[[d1_databases]]
binding = "DB"
database_name = "inspect-able-db"
database_id = "8b9169fb-4b7b-4ea1-a7a6-eb8572f083ee"

[[r2_buckets]]
binding = "BACKUP"
bucket_name = "inspect-able-backups"

[[r2_buckets]]
binding = "MEDIA"
bucket_name = "inspect-able-media"

# KV Namespace — config, RBAC matrix, user-role cache, session registry and buildings cache.
# Create with: wrangler kv:namespace create SETTINGS
# Then replace the id below with the output ID.
[[kv_namespaces]]
binding = "SETTINGS"
id = "19aabea7e6584cbb9aa912be4409312a"
